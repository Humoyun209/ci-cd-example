name: CI/CD Pipeline (Direct Deploy)

on:
  push:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest
      
  deploy:
    runs-on: ubuntu-latest
    needs: tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 9633
          source: "."
          target: "/var/www/my-fastapi-app"

      - name: Build and Run Docker on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 9633
          script: |
            cd /var/www/my-fastapi-app
            docker build -t fastapi-local .
            docker stop fastapi-todo-app || true
            docker rm fastapi-todo-app || true
            docker run -d \
              --name fastapi-todo-app \
              -p 9696:9696 \
              --restart unless-stopped \
              fastapi-local